spring.application.name=mundial-ticketing-backend

# Conexion a MySQL (sobreescribir con variables de entorno en produccion)
spring.datasource.url=${TICKETING_DB_URL:jdbc:mysql://localhost:3306/mundial_ticketing?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${TICKETING_DB_USER:xr_g3_admin}
spring.datasource.password=${TICKETING_DB_PASSWORD:bruno123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexiones (HikariCP - viene con Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Fechas como ISO-8601, no timestamps numericos
spring.jackson.serialization.write-dates-as-timestamps=false

server.port=${SERVER_PORT:8080}

spring.datasource.hikari.initializationFailTimeout=60000
logging.level.com.zaxxer.hikari=DEBUG